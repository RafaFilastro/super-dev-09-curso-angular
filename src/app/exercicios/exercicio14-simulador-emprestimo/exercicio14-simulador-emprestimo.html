<div class="exercicio14-simulador-emprestimo">
    <h1>Simulador de Empréstimo</h1>
    <form (ngSubmit)="calcularEmprestimo()">
        <div class="form-group">
            <label for="valor">Valor do Empréstimo:</label>
            <input type="number" id="valor" [(ngModel)]="valor" name="valor" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="taxa">Taxa de Juros Anual (%):</label>
            <input type="number" id="taxa" [(ngModel)]="taxa" name="taxa" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="parcelas">Número de Parcelas:</label>
            <input type="number" id="parcelas" [(ngModel)]="parcelas" name="parcelas" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Calcular</button>
    </form>
    <div *ngIf="resultado">
        <h2>Resultado:</h2>
        <p>Valor da Parcela: {{ resultado.parcela | currency:'BRL'  }}</p>
        <p>Valor Total Pago: {{ resultado.totalPago | currency:'BRL' }}</p>
        <p>Valor Total de Juros: {{ resultado.juros | currency:'BRL' }}</p>
    </div>
</div>
