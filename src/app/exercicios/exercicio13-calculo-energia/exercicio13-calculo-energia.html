<div class="exercicio13-calculo-energia">
  <h1>Cálculo de Energia</h1>

  <form (ngSubmit)="calcularEnergia()">
    <label for="potencia">Potência (W):</label>
    <input
      type="number"
      id="potencia"
      name="potencia"
      [(ngModel)]="potencia"
    />

    <label for="tempo">Tempo de Uso (horas):</label>
    <input
      type="number"
      id="tempo"
      name="tempo"
      [(ngModel)]="tempo"
    />

    <button type="submit">
      Calcular Energia
    </button>
  </form>

  <div class="resultado" *ngIf="energiaCalculada !== null">
    <p>Energia Consumida: {{ energiaCalculada }} kWh</p>
  </div>
</div>
